# Configuration for the lychee link checker (https://lychee.cli.rs)

# Network behavior
max_concurrency = 8
max_retries = 3
retry_wait_time = 2
timeout = 20

# Some standards bodies and enterprise sites reject bot requests (403) or
# rate-limit (429) instead of returning the real status. Accept these so the
# check does not produce false negatives for links that work in a browser.
accept = ["200..=206", "403", "429"]

# Send a browser-like User-Agent to reduce bot blocking.
user_agent = "Mozilla/5.0 (compatible; lychee link checker)"

# Don't fail the build on transient mailto/anchor checks.
exclude_mail = true

# These depend on repository settings being switched on. Remove each entry
# once the corresponding feature is live:
#   - GitHub Pages: Settings -> Pages -> Deploy from branch `main`
#   - Discussions:  Settings -> General -> Features -> Discussions
exclude = [
  "https://sbarkalov.github.io/awesome-analysis/",
  "https://github.com/sbarkalov/awesome-analysis/discussions",
]

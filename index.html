<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Awesome Analysis</title>
<meta name="description" content="A curated list of awesome tools, frameworks, standards, and resources for business, systems, and product analysis.">
<style>
  :root {
    --bg: #0d1117;
    --bg-soft: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #9da7b3;
    --link: #6cb6ff;
    --accent: #2f81f7;
    --active-bg: #1f6feb22;
  }
  [data-theme="light"] {
    --bg: #ffffff;
    --bg-soft: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --text-dim: #59636e;
    --link: #0969da;
    --accent: #0969da;
    --active-bg: #0969da14;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; padding: .6rem 1.25rem;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand { font-weight: 700; letter-spacing: .2px; }
  .topbar .actions { display: flex; align-items: center; gap: .75rem; }
  .topbar a, .topbar button { color: var(--text-dim); }
  .toggle {
    background: var(--bg-soft); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: .35rem .6rem;
    cursor: pointer; font-size: .9rem; line-height: 1;
  }
  .toggle:hover { border-color: var(--accent); }
  .search {
    background: var(--bg-soft); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: .35rem .6rem;
    font-size: .9rem; width: 200px; max-width: 40vw;
  }
  .search:focus { outline: none; border-color: var(--accent); }
  .toc .search { width: 100%; max-width: none; margin-bottom: .85rem; }
  .no-results { color: var(--text-dim); padding: 1rem 0; display: none; }

  .layout {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 2rem;
    max-width: 1180px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 4rem;
  }

  .toc {
    position: sticky;
    top: 64px;
    align-self: start;
    max-height: calc(100vh - 84px);
    overflow-y: auto;
    padding-right: .5rem;
    font-size: .9rem;
  }
  .toc-title {
    text-transform: uppercase; letter-spacing: .08em;
    font-size: .72rem; color: var(--text-dim);
    margin: .25rem 0 .75rem;
  }
  .toc ul { list-style: none; margin: 0; padding: 0; }
  .toc li { margin: 0; }
  .toc a {
    display: block;
    padding: .28rem .6rem;
    color: var(--text-dim);
    border-left: 2px solid transparent;
    border-radius: 0 4px 4px 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .toc a:hover { color: var(--text); text-decoration: none; }
  .toc a.sub { padding-left: 1.5rem; font-size: .85rem; }
  .toc a.active {
    color: var(--text);
    background: var(--active-bg);
    border-left-color: var(--accent);
    font-weight: 600;
  }

  .content { min-width: 0; }
  .content h1, .content h2, .content h3 { scroll-margin-top: 70px; line-height: 1.25; }
  .content h1 { font-size: 2rem; border-bottom: 1px solid var(--border); padding-bottom: .3rem; }
  .content h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: .3rem; margin-top: 2.2rem; }
  .content h3 { font-size: 1.15rem; margin-top: 1.6rem; }
  .content img { vertical-align: middle; }
  .content code {
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 5px; padding: .1rem .35rem; font-size: .88em;
  }
  .content hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; }
  .content ul { padding-left: 1.3rem; }
  .content li { margin: .2rem 0; }
  .content blockquote {
    margin: 0 0 1rem; padding: .2rem 1rem; color: var(--text-dim);
    border-left: 3px solid var(--border);
  }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .toc { position: static; max-height: none; }
    #tocList { display: none; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand">📊 Awesome Analysis</span>
    <span class="actions">
      <a href="https://github.com/sbarkalov/awesome-analysis" title="View on GitHub">GitHub</a>
      <button class="toggle" id="themeToggle" aria-label="Toggle color theme">🌙 Dark</button>
    </span>
  </div>

  <div class="layout">
    <nav class="toc" id="toc" aria-label="Table of contents">
      <input type="search" id="search" class="search" placeholder="🔍 Search…" aria-label="Search entries" autocomplete="off">
      <div class="toc-list" id="tocList"></div>
    </nav>
    <main class="content" id="content">Loading…</main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
  (function () {
    // ---- Theme (dark by default, persisted) ----
    var root = document.documentElement;
    var toggle = document.getElementById('themeToggle');
    var saved = localStorage.getItem('theme');
    if (saved) root.setAttribute('data-theme', saved);
    function syncToggle() {
      var dark = root.getAttribute('data-theme') !== 'light';
      toggle.textContent = dark ? '🌙 Dark' : '☀️ Light';
    }
    syncToggle();
    toggle.addEventListener('click', function () {
      var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      syncToggle();
    });

    // ---- GitHub-style slugger ----
    function makeSlugger() {
      var seen = {};
      return function (text) {
        var slug = text.toLowerCase().trim()
          .replace(/[^\w\- ]+/g, '')
          .replace(/\s+/g, '-');
        if (seen[slug] != null) { seen[slug]++; slug = slug + '-' + seen[slug]; }
        else { seen[slug] = 0; }
        return slug;
      };
    }

    var content = document.getElementById('content');
    var tocEl = document.getElementById('toc');
    var tocList = document.getElementById('tocList');

    fetch('README.md', { cache: 'no-cache' })
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function (md) {
        content.innerHTML = marked.parse(md);

        // Assign ids to headings
        var slug = makeSlugger();
        content.querySelectorAll('h1, h2, h3').forEach(function (h) {
          if (!h.id) h.id = slug(h.textContent);
        });

        // Remove the in-body "Contents" section (sidebar replaces it),
        // but keep a #contents anchor so "back to top" links still work.
        var contentsHeading = document.getElementById('contents');
        if (contentsHeading) {
          var next = contentsHeading.nextElementSibling;
          if (next && next.tagName === 'UL') next.remove();
          var anchor = document.createElement('span');
          anchor.id = 'contents';
          contentsHeading.id = '';
          content.insertBefore(anchor, content.firstChild);
          contentsHeading.remove();
        }

        buildToc();
        setupScrollSpy();
        setupSearch();
      })
      .catch(function (e) {
        content.innerHTML = '<p>Could not load <code>README.md</code> (' + e.message + ').</p>';
      });

    function buildToc() {
      var headings = content.querySelectorAll('h2, h3');
      var rootUl = document.createElement('ul');
      var currentSubUl = null;
      var title = document.createElement('div');
      title.className = 'toc-title';
      title.textContent = 'Contents';
      tocList.appendChild(title);

      headings.forEach(function (h) {
        if (!h.id) return;
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent.replace(/\s+/g, ' ').trim();
        a.dataset.target = h.id;
        li.appendChild(a);

        if (h.tagName === 'H3') {
          a.className = 'sub';
          (currentSubUl || rootUl).appendChild(li);
        } else {
          rootUl.appendChild(li);
          var subUl = document.createElement('ul');
          li.appendChild(subUl);
          currentSubUl = subUl;
        }
      });
      tocList.appendChild(rootUl);
    }

    function setupScrollSpy() {
      var links = Array.prototype.slice.call(tocEl.querySelectorAll('a'));
      var map = {};
      var targets = [];
      links.forEach(function (a) {
        var el = document.getElementById(a.dataset.target);
        if (el) { map[a.dataset.target] = a; targets.push(el); }
      });
      if (!targets.length) return;

      var ticking = false;
      function update() {
        ticking = false;
        var activeId = targets[0].id;
        for (var i = 0; i < targets.length; i++) {
          if (targets[i].getBoundingClientRect().top <= 92) activeId = targets[i].id;
          else break;
        }
        links.forEach(function (a) { a.classList.remove('active'); });
        var active = map[activeId];
        if (active) {
          active.classList.add('active');
          active.scrollIntoView({ block: 'nearest' });
        }
      }
      function onScroll() {
        if (!ticking) { ticking = true; requestAnimationFrame(update); }
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);
      update();
    }

    function setupSearch() {
      var input = document.getElementById('search');
      if (!input) return;

      // Group content into sections: a heading plus the nodes that follow it.
      var blocks = [];
      var cur = { heading: null, nodes: [] };
      Array.prototype.slice.call(content.children).forEach(function (node) {
        if (/^H[1-3]$/.test(node.tagName)) {
          if (cur.heading || cur.nodes.length) blocks.push(cur);
          cur = { heading: node, nodes: [] };
        } else {
          cur.nodes.push(node);
        }
      });
      if (cur.heading || cur.nodes.length) blocks.push(cur);

      var empty = document.createElement('p');
      empty.className = 'no-results';
      empty.textContent = 'No matching entries.';
      content.appendChild(empty);

      function clearFilter() {
        blocks.forEach(function (b) {
          if (b.heading) b.heading.style.display = '';
          b.nodes.forEach(function (n) {
            n.style.display = '';
            if (n.tagName === 'UL') {
              Array.prototype.slice.call(n.children).forEach(function (li) { li.style.display = ''; });
            }
          });
        });
        empty.style.display = 'none';
        if (tocList) tocList.style.display = '';
      }

      function applyFilter(q) {
        var anyResult = false;
        blocks.forEach(function (b) {
          var sectionVisible = false;
          b.nodes.forEach(function (n) {
            if (n.tagName === 'UL') {
              var listVisible = false;
              Array.prototype.slice.call(n.children).forEach(function (li) {
                var m = li.textContent.toLowerCase().indexOf(q) !== -1;
                li.style.display = m ? '' : 'none';
                if (m) listVisible = true;
              });
              n.style.display = listVisible ? '' : 'none';
              if (listVisible) sectionVisible = true;
            } else {
              n.style.display = 'none'; // hide descriptions, rules, back-to-top while searching
            }
          });
          if (b.heading) b.heading.style.display = sectionVisible ? '' : 'none';
          if (sectionVisible) anyResult = true;
        });
        empty.style.display = anyResult ? 'none' : 'block';
        if (tocList) tocList.style.display = 'none';
      }

      input.addEventListener('input', function () {
        var q = this.value.trim().toLowerCase();
        if (!q) clearFilter(); else applyFilter(q);
      });
    }
  })();
  </script>
</body>
</html>
